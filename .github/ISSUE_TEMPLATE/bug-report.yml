name: Bug Report
description: Report a bug in OpenCMA
labels: ["bug"]
body:
  - type: checkboxes
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and this hasn't been reported
          required: true
        - label: I'm using the latest version of OpenCMA
          required: true

  - type: textarea
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Create cma.yaml with...
        2. Run `cma plan`
        3. See error...
    validations:
      required: true

  - type: textarea
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: input
    attributes:
      label: Version
      description: Output of `bun run bin/cma.ts --version` or commit hash.
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Provider
      options:
        - Claude (Anthropic)
        - Qoder
        - Both / Multi-provider
        - N/A
    validations:
      required: true

  - type: textarea
    attributes:
      label: Relevant config (redact secrets)
      description: Paste your cma.yaml (with secrets replaced by `***`).
      render: yaml

  - type: textarea
    attributes:
      label: Error output
      description: Full error message or stack trace.
      render: text
